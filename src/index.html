<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem; }
      .app { max-width: 500px; width: 100%; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
      .header { padding: 1.5rem; border-bottom: 1px solid #eee; }
      .header h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #333; }
      .new-todo { width: 100%; padding: 0.5rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 4px; }
      .todo-list { list-style: none; }
      .todo-item { display: flex; align-items: center; padding: 0.75rem 1.5rem; border-bottom: 1px solid #eee; gap: 0.75rem; }
      .todo-title { flex: 1; }
      .completed .todo-title { text-decoration: line-through; color: #aaa; }
      .delete-btn { background: none; border: none; color: #cc5555; font-size: 1.25rem; cursor: pointer; }
      .empty-message { padding: 1.5rem; text-align: center; color: #999; }
      .footer { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1.5rem; border-top: 1px solid #eee; font-size: 0.875rem; color: #777; }
      .filters { display: flex; gap: 0.5rem; }
      .filters button { background: none; border: 1px solid transparent; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; }
      .filters button.selected { border-color: #4a90d9; color: #4a90d9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
